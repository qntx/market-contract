[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.34"
evm_version = "osaka"
optimizer = true
optimizer_runs = 200
via_ir = false
ffi = false
gas_reports = ["AgenticCommerce"]

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[profile.default.fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "params_first"
quote_style = "double"
number_underscore = "thousands"
single_line_statement_blocks = "preserve"

[profile.ci]
fuzz = { runs = 1000 }
invariant = { runs = 256 }
